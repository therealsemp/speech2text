name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [develop]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore speech2text.sln

      - name: Build
        run: dotnet build speech2text.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test speech2text.sln --no-build --configuration Release
